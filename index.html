<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://api.openweathermap.org/data/2.5/weather?appid=YOUR_API_KEY&units=metric"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        input[type='text'] { width: calc(100% - 30px); padding: 10px; margin-bottom: 10px; }
        button { padding: 10px; }
        .weather-info { margin-top: 20px; }
        .weather-info div { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Dashboard</h1>
        <input type="text" id="cityInput" placeholder="Enter city name" />
        <button onclick="getWeather()">Get Weather</button>
        <div class="weather-info" id="weatherInfo"></div>
    </div>
    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value;
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=YOUR_API_KEY&units=metric`);
            const data = await response.json();
            displayWeather(data);
        }

        function displayWeather(data) {
            const weatherInfo = document.getElementById('weatherInfo');
            if (data.cod === 200) {
                weatherInfo.innerHTML = `
                    <div>City: ${data.name}</div>
                    <div>Temperature: ${data.main.temp} °C</div>
                    <div>Weather: ${data.weather[0].description}</div>
                    <div>Humidity: ${data.main.humidity}%</div>
                `;
            } else {
                weatherInfo.innerHTML = `<div>${data.message}</div>`;
            }
        }
    </script>
</body>
</html>
